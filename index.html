<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product Management System</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <main class="app">
    <header class="app-header">
      <div>
        <h1>Product Management System</h1>
      </div>
      <div class="header-controls">
        <div class="stats">
          <strong id="totalCount">0</strong>
          <span>Products</span>
        </div>

        <div class="search-filter">
          <input id="search" type="search" placeholder="Search by name or category..." aria-label="Search products" />
          <select id="filter">
            <option value="all">All Products</option>
            <option value="in">In Stock</option>
            <option value="out">Out of Stock</option>
          </select>
        </div>

        <button id="createBtn" class="btn primary">Create Product</button>
      </div>
    </header>

    <section class="content">
      <div id="noProducts" class="no-products">No Product Found</div>
      <div id="cardsContainer" class="cards-container"></div>
    </section>
  </main>

  <!-- Modal Form -->
  <div id="overlay" class="overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <h2 id="modalTitle">Create Product</h2>
        <button id="formClose" class="btn icon" title="Close form" aria-label="Close form">&times;</button>
      </header>

      <form id="productForm" class="form">
        <input type="hidden" id="productId" />

        <!-- Product Name -->
        <div class="form-row">
          <label for="name">Product Name</label>
          <input id="name" name="name" type="text" placeholder="Enter product name" required />
          <small class="form-help" id="nameHelp"></small>
        </div>

        <!-- Category -->
        <div class="form-row">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Groceries">Groceries</option>
            <option value="Stationery">Stationery</option>
            <option value="Furniture">Furniture</option>
          </select>
          <small class="form-help" id="catHelp"></small>
        </div>

        <!-- Quantity -->
        <div class="form-row">
          <label for="quantity">Quantity</label>
          <input id="quantity" name="quantity" type="text" placeholder="Enter quantity" required />
          <small class="form-help" id="qtyHelp"></small>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn primary">Submit</button>
          <button type="button" id="cancelBtn" class="btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation -->
  <div id="confirmOverlay" class="overlay hidden" aria-hidden="true">
    <div class="confirm" role="dialog" aria-modal="true">
      <p id="confirmText">Are you sure you want to delete this product?</p>
      <div class="confirm-actions">
        <button id="confirmCancel" class="btn">Cancel</button>
        <button id="confirmOk" class="btn danger">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="index.js" defer></script>
</body>

</html>
